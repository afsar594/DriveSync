<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Tracking
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Tracking</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Map View</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div class="map-placeholder">
          [Map Placeholder - Vehicle Location Tracking]
        </div>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Current Location</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p>Vehicle: Toyota Camry</p>
        <p>Location: 123 Main St, City, State</p>
        <p>Speed: 45 mph</p>
        <p>Status: Moving</p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
