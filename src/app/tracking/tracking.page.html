<ion-content [fullscreen]="true" class="tracking-content">

  <div #mapContainer id="map" class="full-screen-map"></div>


  <div class="control-panel">
    <div class="button-bar">
      <ion-button
        *ngIf="!isTracking && !isLoading"
        (click)="startTracking()"
        color="success"
        size="small">
        ▶️ Real-Time
      </ion-button>
      <ion-button
        *ngIf="!isTracking && !isLoading"
        (click)="startSimulatedTracking()"
        color="warning"
        size="small">
        🎬 Simulate
      </ion-button>
      <ion-button
        *ngIf="isTracking"
        (click)="stopTracking()"
        color="danger"
        size="small">
        ⏹️ Stop
      </ion-button>
      <ion-button
        *ngIf="isLoading"
        disabled="true"
        color="primary"
        size="small">
        ⏳ Loading
      </ion-button>
    </div>

  
    <div class="status-badge">
      <span *ngIf="!isTracking && !isLoading" class="status-dot stopped"></span>
      <span *ngIf="isTracking" class="status-dot active"></span>
      <span *ngIf="isLoading" class="status-dot loading"></span>
      <span class="status-label">
        <span *ngIf="!isTracking && !isLoading">Stopped</span>
        <span *ngIf="isTracking">Tracking</span>
        <span *ngIf="isLoading">Loading</span>
      </span>
    </div>

  
    <div class="live-info" *ngIf="currentLocation">
      📍 {{ currentLocation.latitude.toFixed(4) }}, {{ currentLocation.longitude.toFixed(4) }} | 
      🚗 {{ currentLocation.speed.toFixed(1) }} mph | 
      🧭 {{ currentLocation.heading.toFixed(0) }}°
    </div>
  </div>
</ion-content>
