<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Dashboard
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Dashboard</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <h1>Welcome to DriveSync</h1>
    <p>Your vehicle management dashboard</p>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Total Vehicles</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        3 vehicles registered
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Active Tracking</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        2 vehicles currently tracked
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Recent Trips</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        5 trips this week
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
